name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python (api)
        run: flake8 api/main.py --max-line-length=88

      - name: Lint Python (worker)
        run: flake8 worker/worker.py --max-line-length=88

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ESLint
        run: npm install --save-dev eslint @eslint/js
        working-directory: ${{ github.workspace }}

      - name: Create ESLint config
        run: |
          cat > eslint.config.js << 'EOF'
          import js from "@eslint/js";
          export default [
            js.configs.recommended,
            {
              languageOptions: {
                ecmaVersion: 2021,
                globals: {
                  require: "readonly",
                  process: "readonly",
                  console: "readonly",
                  __dirname: "readonly"
                }
              }
            }
          ];
          EOF

      - name: Lint JavaScript
        run: npx eslint frontend/app.js

      - name: Lint api Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest==7.4.3 pytest-cov==4.1.0 httpx==0.24.1 anyio==3.7.1

      - name: Run tests with coverage
        run: pytest api/tests/ -v --cov=api --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
        
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and push all images to local registry
        run: |
          docker buildx build --push --load \
            -t localhost:5000/api:latest \
            -t localhost:5000/api:${{ github.sha }} \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --network=host ./api

          docker buildx build --push --load \
            -t localhost:5000/worker:latest \
            -t localhost:5000/worker:${{ github.sha }} \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --network=host ./worker

          docker buildx build --push --load\
            -t localhost:5000/frontend:latest \
            -t localhost:5000/frontend:${{ github.sha }} \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --network=host ./frontend

      - name: Tag images with compose naming
        run: |
          docker tag localhost:5000/api:latest stage2-hng14-devops-api:latest
          docker tag localhost:5000/worker:latest stage2-hng14-devops-worker:latest
          docker tag localhost:5000/frontend:latest stage2-hng14-devops-frontend:latest

      - name: Save images as tar artifacts
        run: |
          docker save \
            localhost:5000/api:latest \
            localhost:5000/worker:latest \
            localhost:5000/frontend:latest \
            stage2-hng14-devops-api:latest \
            stage2-hng14-devops-worker:latest \
            stage2-hng14-devops-frontend:latest \
            -o images.tar

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: images.tar

  security:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Load images
        run: docker load -i images.tar

      - name: Scan api image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/api:latest
          format: table
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: "1"

      - name: Scan worker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/worker:latest
          format: table
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: "1"

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/frontend:latest
          format: table
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: "1"

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: "*.sarif"

  integration-test:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "REDIS_PASSWORD=" > .env

      - name: Start full stack
        run: docker compose up --build -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services..."
          sleep 30
      - name: Install jq
        run: sudo apt-get install -y jq
        
      - name: Submit a job and verify completion
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:3000/submit | jq -r '.job_id')
          echo "Submitted job: $JOB_ID"

          for i in $(seq 1 15); do
            STATUS=$(curl -s http://localhost:3000/status/$JOB_ID | jq -r '.status')
            echo "Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully"
              exit 0
            fi
            sleep 2
          done

          echo "Job did not complete in time"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    env:
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD || '' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Load images
        run: docker load -i images.tar

      - name: Start stack
        run: docker compose up --no-build -d

      - name: Wait for services
        run: sleep 30

      - name: Verify stack is running
        run: |
          docker ps -a
          docker inspect stage2-hng14-devops-redis-1 \
            --format='Redis: {{.State.Health.Status}}'
          docker inspect stage2-hng14-devops-api-1 \
            --format='API: {{.State.Health.Status}}'

      - name: Rolling update api
        run: |
          docker compose up -d --no-deps --scale api=2 --no-recreate api
          sleep 15

          NEW_CONTAINER=$(docker compose ps -q api | tail -1)
          STATUS=$(docker inspect --format='{{.State.Health.Status}}' $NEW_CONTAINER 2>/dev/null)
          echo "New container health: $STATUS"

          if [ "$STATUS" = "healthy" ]; then
            OLD_CONTAINER=$(docker compose ps -q api | head -1)
            docker stop $OLD_CONTAINER
            docker rm $OLD_CONTAINER
            docker image prune -f
            echo "Rolling update complete"
          else
            echo "Health check failed — aborting, leaving old container running"
            docker stop $NEW_CONTAINER
            docker rm $NEW_CONTAINER
            exit 1
          fi

      - name: Tear down
        if: always()
        run: docker compose down -v